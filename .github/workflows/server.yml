name: Minecraft Server

on:
  workflow_dispatch:

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

    - name: Download Paper
      run: |
        curl -L -o server.jar https://api.papermc.io/v2/projects/paper/versions/1.20.4/builds/499/downloads/paper-1.20.4-499.jar
        file server.jar
        ls -lh server.jar

      - name: Accept EULA
        run: |
          echo "eula=true" > eula.txt

      - name: Configure Server
        run: |
          echo "online-mode=false" > server.properties

      - name: Start Server
        run: |
          java -Xms2G -Xmx6G -jar server.jar nogui
