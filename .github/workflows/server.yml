name: Minecraft Server

on:
  workflow_dispatch:

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Download Purpur 1.20.4
        run: |
          curl -L "https://api.purpurmc.org/v2/purpur/1.20.4/latest/download" -o server.jar
          file server.jar
          ls -lh server.jar

      - name: Accept EULA
        run: |
          echo "eula=true" > eula.txt

      - name: Create server.properties
        run: |
          cat > server.properties <<EOF
          online-mode=false
          server-port=25565
          motd=GitHub Minecraft Server
          max-players=10
          difficulty=normal
          gamemode=survival
          spawn-protection=0
          EOF

      - name: Start Server
        run: |
          java -Xms2G -Xmx6G -jar server.jar nogui
